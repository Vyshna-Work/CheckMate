<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #eef1f5;
      color: #333;
      display: flex;
      justify-content: center;
    }

    /* Center container */
    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 32px;
      color: #222;
      text-align: center;
    }

    h2 {
      margin-top: 40px;
      font-size: 26px;
      color: #333;
      text-align: center;
    }

    h3 {
      margin-top: 20px;
      font-size: 20px;
      color: #444;
      text-align: center;
    }

    /* Card container */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Buttons */
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 5px;
    }

    .refresh-btn {
      background: #3498db;
      color: white;
    }

    .logout-btn {
      background: #555;
      color: white;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
    }

    /* Top buttons centered */
    .top-buttons {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Inputs aligned */
    .session-form {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .session-form input {
      width: 160px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      table-layout: fixed;
      text-align: left;
    }

    th {
      background: #3498db;
      color: white;
      padding: 12px;
      font-size: 15px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      word-wrap: break-word;
    }

    tr:hover td {
      background: #f6faff;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Admin Dashboard</h1>

    <div class="top-buttons">
      <button class="refresh-btn" onclick="loadUsers()">Refresh Users</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- USERS SECTION -->
    <h2>Users</h2>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Birthday</th>
            <th>BLE ID</th>
            <th>NFC ID</th>
            <th>Device ID</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>

    <!-- SESSIONS SECTION -->
    <h2>Sessions</h2>

    <div class="card">
      <h3>Create New Session</h3>

      <div class="session-form">
        <input id="s_name" placeholder="Session Name">
        <input id="s_date" placeholder="YYYY-MM-DD">
        <input id="s_day" placeholder="Monday">
        <input id="s_start" placeholder="Start HH:MM">
        <input id="s_end" placeholder="End HH:MM">
        <input id="s_late" placeholder="Late HH:MM">
        <button class="refresh-btn" onclick="createSession()">Create</button>
      </div>
    </div>

    <div class="card">
      <button class="refresh-btn" onclick="loadSessions()">Refresh Sessions</button>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date</th>
            <th>Day</th>
            <th>Start</th>
            <th>End</th>
            <th>Late Threshold</th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
    </div>
    <!-- ATTENDANCE SECTION -->
    <h2>Attendance Logs</h2>

    <div class="card">
      <button class="refresh-btn" onclick="loadAttendance()">Refresh Attendance</button>

      <table>
        <thead>
          <tr>
            <th>Log ID</th>
            <th>Timestamp</th>
            <th>Method</th>
            <th>Status</th>
            <th>User</th>
            <th>Session</th>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
          </tr>
        </thead>
        <tbody id="attendance-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    // -----------------------------
    // SECURE ADMIN KEY HANDLING
    // -----------------------------
    let ADMIN_KEY = localStorage.getItem("ADMIN_KEY");

    if (!ADMIN_KEY) {
      ADMIN_KEY = prompt("Enter Admin Key:");
      if (!ADMIN_KEY) {
        alert("Admin Key required.");
        throw new Error("No admin key provided");
      }
      localStorage.setItem("ADMIN_KEY", ADMIN_KEY);
    }

    function logout() {
      localStorage.removeItem("ADMIN_KEY");
      location.reload();
    }

    // -----------------------------
    // LOAD USERS
    // -----------------------------
    async function loadUsers() {
      const res = await fetch('/admin/users', {
        headers: { 'Admin-Key': ADMIN_KEY }
      });

      if (res.status === 401) {
        alert("Unauthorized: Wrong Admin Key");
        logout();
        return;
      }

      const users = await res.json();
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = '';

      users.forEach(user => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${user.user_id}</td>
          <td>${user.name}</td>
          <td>${user.birthday || ''}</td>
          <td>${user.ble_id || ''}</td>
          <td>${user.nfc_id || ''}</td>
          <td>${user.device_id || ''}</td>
          <td>
            <button class="delete-btn" onclick="deleteUser(${user.user_id})">
              Delete
            </button>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    // -----------------------------
    // DELETE USER
    // -----------------------------
    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;

      const res = await fetch('/admin/users/' + id, {
        method: 'DELETE',
        headers: { 'Admin-Key': ADMIN_KEY }
      });

      if (res.status === 401) {
        alert("Unauthorized: Wrong Admin Key");
        logout();
        return;
      }

      loadUsers();
    }

    // -----------------------------
    // LOAD SESSIONS
    // -----------------------------
    async function loadSessions() {
      const res = await fetch('/admin/sessions', {
        headers: { 'Admin-Key': ADMIN_KEY }
      });

      if (res.status === 401) {
        alert("Unauthorized: Wrong Admin Key");
        logout();
        return;
      }

      const sessions = await res.json();
      const tbody = document.getElementById('sessions-body');
      tbody.innerHTML = '';

      sessions.forEach(s => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${s.session_id}</td>
          <td>${s.session_name}</td>
          <td>${s.date}</td>
          <td>${s.day}</td>
          <td>${s.start_time}</td>
          <td>${s.end_time}</td>
          <td>${s.late_threshold}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    // -----------------------------
    // CREATE SESSION
    // -----------------------------
    async function createSession() {
      const body = {
        session_name: document.getElementById('s_name').value,
        date: document.getElementById('s_date').value,
        day: document.getElementById('s_day').value,
        start_time: document.getElementById('s_start').value,
        end_time: document.getElementById('s_end').value,
        late_threshold: document.getElementById('s_late').value
      };

      const res = await fetch('/admin/sessions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Admin-Key': ADMIN_KEY
        },
        body: JSON.stringify(body)
      });

      if (res.status === 201) {
        alert("Session created!");
        loadSessions();
      } else {
        const err = await res.json();
        alert("Error: " + err.error);
      }
    }
    // -----------------------------
    // attendene logs
    //------------------------------
    async function loadAttendance() {
    const res = await fetch('/admin/attendance', {
      headers: { 'Admin-Key': ADMIN_KEY }
    });

    if (res.status === 401) {
      alert("Unauthorized: Wrong Admin Key");
      logout();
      return;
    }

    const logs = await res.json();
    const tbody = document.getElementById('attendance-body');
    tbody.innerHTML = '';

    logs.forEach(row => {
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td>${row.log_id}</td>
        <td>${row.timestamp}</td>
        <td>${row.method}</td>
        <td>${row.status}</td>
        <td>${row.user_name}</td>
        <td>${row.session_name || ''}</td>
        <td>${row.date || ''}</td>
        <td>${row.start_time || ''}</td>
        <td>${row.end_time || ''}</td>
      `;

      tbody.appendChild(tr);
    });
    }
    // -----------------------------
    // AUTO LOAD ON PAGE START
    // -----------------------------
    window.onload = () => {
      loadUsers();
      loadSessions();
      loadAttendance();
    };
  </script>

</body>
</html>
